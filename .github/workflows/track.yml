name: ETF Holdings Tracker

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Track 00981A
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: 1296db4b170b4f5ab201a52af867191c
          FUND_CODE: 49YTW
          ETF_NAME: 00981A
        run: python track_holdings.py

      - name: Track 00988A
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: 35712f89d97c80a2b74cddd7e1baf99d
          FUND_CODE: 61YTW
          ETF_NAME: 00988A
        run: python track_holdings.py

      - name: Commit snapshot files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add previous_holdings_*.json
          git diff --cached --quiet || git commit -m "chore: update holdings snapshot $(date +'%Y-%m-%d')"
          git push
