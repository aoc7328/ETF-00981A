name: 00981A 瘥?餈質馱

on:
  schedule:
    # UTC 15:00 = ?啁?? 23:00嚗曹??圈曹?
    - cron: "0 15 * * 1-5"
  workflow_dispatch:   # ?迂??閫貊嚗葫閰衣嚗?
jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ?迂 commit previous_holdings.json ??repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run holdings tracker
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python track_holdings.py

      - name: Commit previous_holdings.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add previous_holdings.json
          git diff --cached --quiet || git commit -m "chore: update holdings snapshot $(date +'%Y-%m-%d')"
          git push
