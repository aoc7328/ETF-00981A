name: 00981A ETF Holdings Tracker

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run holdings tracker
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python track_holdings.py

      - name: Commit previous_holdings.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add previous_holdings.json
          git diff --cached --quiet || git commit -m "chore: update holdings snapshot $(date +'%Y-%m-%d')"
          git push