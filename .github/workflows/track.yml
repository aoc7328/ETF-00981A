name: 00981A 每日持股追蹤

on:
  schedule:
    # UTC 15:00 = 台灣時間 23:00，週一到週五
    - cron: "0 15 * * 1-5"
  workflow_dispatch:   # 允許手動觸發（測試用）

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許 commit previous_holdings.json 回 repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run holdings tracker
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python track_holdings.py

      - name: Commit previous_holdings.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add previous_holdings.json
          git diff --cached --quiet || git commit -m "chore: update holdings snapshot $(date +'%Y-%m-%d')"
          git push
